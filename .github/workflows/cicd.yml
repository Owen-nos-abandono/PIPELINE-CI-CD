name: CI/CD Pipeline Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Análisis de Calidad
  sonarqube:
    name: Análisis SonarQube
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: SonarSource/sonarqube-scan-action@v3.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST }}
      - uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST }}

  # 2. Construcción y Subida
  build-and-push:
    name: Build and Push to GHCR
    needs: sonarqube
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ESTE PASO ES LA CLAVE: Convierte el nombre del repo a minúsculas
      - name: Prepare Repo Name (Lowercase)
        id: repo_prep
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usamos la variable en minúsculas aquí
          tags: ghcr.io/${{ steps.repo_prep.outputs.repo_lc }}:main

  # 3. Prueba de Rendimiento
  k6:
    name: Prueba de Rendimiento K6
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Instalar y Ejecutar K6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/k6
          npm start &
          sleep 15
          k6 run script-rendimiento.js || echo "K6 falló pero continuamos"

  # 4. Despliegue Blue-Green
  deploy:
    name: Blue-Green Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Repo Name (Lowercase)
        id: repo_name
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            [ -f ~/current_deploy.env ] && source ~/current_deploy.env || LAST_DEPLOY=blue
            
            if [ "$LAST_DEPLOY" == "blue" ]; then
                TARGET_COLOR="green"; TARGET_PORT="8081"
            else
                TARGET_COLOR="blue"; TARGET_PORT="8080"
            fi

            echo "Desplegando entorno $TARGET_COLOR en puerto $TARGET_PORT..."

            # Usamos la misma lógica de minúsculas
            docker pull ghcr.io/${{ steps.repo_name.outputs.repo }}:main
            docker stop my-app-$TARGET_COLOR || true
            docker rm my-app-$TARGET_COLOR || true
            
            docker run -d \
              --name my-app-$TARGET_COLOR \
              -p $TARGET_PORT:3000 \
              --restart always \
              ghcr.io/${{ steps.repo_name.outputs.repo }}:main

            printf "server {
                listen 80;
                server_name _;
                add_header X-Deployed-Color $TARGET_COLOR always;
                location / {
                    proxy_pass http://127.0.0.1:$TARGET_PORT;
                }
            }\n" > default.conf

            sudo mv default.conf /etc/nginx/conf.d/default.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "LAST_DEPLOY=$TARGET_COLOR" > ~/current_deploy.env
