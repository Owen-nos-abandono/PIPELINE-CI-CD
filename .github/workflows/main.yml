deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Definimos IMAGE_NAME aquí para que el script de la VM la reconozca
          envs: REGISTRY,IMAGE_NAME
          script: |
            # 1. Login al registro
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Leer estado actual (Persistencia)
            if [ -f ~/current_deploy.env ]; then
                source ~/current_deploy.env
            else
                LAST_DEPLOY=blue
            fi

            # 3. Lógica de Inversión (Decidir destino)
            if [ "$LAST_DEPLOY" == "blue" ]; then
                TARGET_COLOR="green"
                TARGET_PORT="8081"
            else
                TARGET_COLOR="blue"
                TARGET_PORT="8080"
            fi

            echo "Desplegando entorno $TARGET_COLOR en puerto $TARGET_PORT..."

            # 4. Desplegar el nuevo contenedor (Docker)
            # Detenemos y quitamos si ya existe uno con ese nombre específico (ej. my-app-green)
            docker stop my-app-$TARGET_COLOR || true
            docker rm my-app-$TARGET_COLOR || true
            docker pull ghcr.io/${{ github.repository }}:main
            
            docker run -d \
              --name my-app-$TARGET_COLOR \
              -p $TARGET_PORT:3000 \
              --restart always \
              ghcr.io/${{ github.repository }}:main

            # 5. Sustitución Automática de Nginx (envsubst)
            # Exportamos para que envsubst las vea
            export TARGET_COLOR=$TARGET_COLOR
            export TARGET_PORT=$TARGET_PORT

            cat << 'EOF' > nginx.template
            server {
                listen 80;
                server_name _;
                add_header X-Deployed-Color "${TARGET_COLOR}" always;

                location / {
                    proxy_pass http://127.0.0.1:${TARGET_PORT};
                }
            }
            EOF

            envsubst '${TARGET_COLOR} ${TARGET_PORT}' < nginx.template > default.conf
            sudo mv default.conf /etc/nginx/conf.d/default.conf
            sudo nginx -t && sudo systemctl reload nginx

            # 6. Actualizar persistencia
            echo "LAST_DEPLOY=$TARGET_COLOR" > ~/current_deploy.env
            echo "Switch completado exitosamente a $TARGET_COLOR"
