name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Este es el trabajo que construye y sube la imagen (SIN dependencias)
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Convertimos el nombre a minúsculas directamente aquí
          tags: ghcr.io/${{ github.repository_owner }}/ms-asesorias:main

  # 2. Este es el trabajo que despliega (DEPENDE del anterior)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Repository Name (Lowercase)
        id: repo_name
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REPO_LOWER
        env:
          REPO_LOWER: ${{ steps.repo_name.outputs.repo }}
        script: |
            # Login al registro
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Lógica Blue-Green
            if [ -f ~/current_deploy.env ]; then
                source ~/current_deploy.env
            else
                LAST_DEPLOY=blue
            fi

            if [ "$LAST_DEPLOY" == "blue" ]; then
                TARGET_COLOR="green"
                TARGET_PORT="8081"
            else
                TARGET_COLOR="blue"
                TARGET_PORT="8080"
            fi

            echo "Desplegando entorno $TARGET_COLOR en puerto $TARGET_PORT..."

            docker pull ghcr.io/$REPO_LOWER:main
            
            docker stop my-app-$TARGET_COLOR || true
            docker rm my-app-$TARGET_COLOR || true
            
            docker run -d \
              --name my-app-$TARGET_COLOR \
              -p $TARGET_PORT:3000 \
              --restart always \
              ghcr.io/$REPO_LOWER:main

            # Actualizar Nginx
            printf "server {
                listen 80;
                server_name _;
                add_header X-Deployed-Color $TARGET_COLOR always;
                location / {
                    proxy_pass http://127.0.0.1:$TARGET_PORT;
                }
            }\n" > default.conf

            sudo mv default.conf /etc/nginx/conf.d/default.conf
            sudo nginx -t && sudo systemctl reload nginx

            echo "LAST_DEPLOY=$TARGET_COLOR" > ~/current_deploy.env
