name: Full CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Análisis de Calidad
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # 2. Construcción de Imagen (Depende de Sonar)
  build-and-push:
    needs: sonarqube
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ms-asesorias:main

  # 3. Despliegue Automatizado (Depende de Build)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Repo Name
        id: repo_name
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REPO_LOWER
        env:
          REPO_LOWER: ${{ steps.repo_name.outputs.repo }}
        script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Cargar estado Blue-Green
            [ -f ~/current_deploy.env ] && source ~/current_deploy.env || LAST_DEPLOY=blue
            
            if [ "$LAST_DEPLOY" == "blue" ]; then
                TARGET_COLOR="green"; TARGET_PORT="8081"
            else
                TARGET_COLOR="blue"; TARGET_PORT="8080"
            fi

            echo "Desplegando en $TARGET_COLOR puerto $TARGET_PORT"

            docker pull ghcr.io/$REPO_LOWER:main
            docker stop my-app-$TARGET_COLOR || true
            docker rm my-app-$TARGET_COLOR || true
            
            docker run -d --name my-app-$TARGET_COLOR -p $TARGET_PORT:3000 --restart always ghcr.io/$REPO_LOWER:main

            # Actualizar Nginx dinámicamente
            printf "server {
                listen 80;
                server_name _;
                add_header X-Deployed-Color $TARGET_COLOR always;
                location / {
                    proxy_pass http://127.0.0.1:$TARGET_PORT;
                }
            }\n" > default.conf

            sudo mv default.conf /etc/nginx/conf.d/default.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "LAST_DEPLOY=$TARGET_COLOR" > ~/current_deploy.env
